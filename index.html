<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>CrewKart — Coming Soon</title>
  <script src="https://code.iconify.design/iconify-icon/1.0.7/iconify-icon.min.js"></script>
  <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      height: 100%;
      overflow: hidden;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: #071F18;
      position: relative;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.02) 1px, transparent 1px);
      background-size: 80px 80px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-1 {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.07), transparent 70%);
      top: -180px; right: -120px;
      pointer-events: none;
      animation: drift 12s ease-in-out infinite;
    }
    .glow-2 {
      position: fixed;
      width: 400px; height: 400px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(20,105,78,0.12), transparent 70%);
      bottom: -120px; left: -100px;
      pointer-events: none;
      animation: drift 14s ease-in-out infinite reverse;
    }

    @keyframes drift {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(20px, 12px); }
    }

    @keyframes fadeUp {
      0% { opacity: 0; transform: translateY(24px); }
      100% { opacity: 1; transform: translateY(0); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    @keyframes logoGlow {
      0%, 100% { opacity: 0.5; transform: translate(-50%, -50%) scale(1); }
      50% { opacity: 0.8; transform: translate(-50%, -50%) scale(1.06); }
    }

    @keyframes socialFloat {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-5px); }
    }

    .page {
      height: 100vh;
      display: flex;
      flex-direction: column;
      position: relative;
      z-index: 1;
    }

    /* Top Bar */
    .topbar {
      display: flex;
      align-items: center;
      padding: 24px 40px;
      flex-shrink: 0;
      animation: fadeUp 0.8s ease both;
    }

    .topbar-logo {
      display: flex;
      align-items: center;
      gap: 10px;
      text-decoration: none;
    }

    .logo-sm {
      width: 40px;
      height: 40px;
      object-fit: contain;
      display: block;
    }

    .wordmark-sm {
      height: 18px;
      object-fit: contain;
      display: block;
    }

    /* Center */
    .center {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 0 24px;
      gap: 0;
      min-height: 0;
    }

    .logo-wrap {
      position: relative;
      margin-bottom: 24px;
      animation: fadeUp 0.8s ease both;
      flex-shrink: 0;
      width: 110px;
      height: 110px;
    }

    .logo-glow {
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 180px; height: 180px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(245,197,24,0.18), rgba(20,105,78,0.08) 50%, transparent 70%);
      filter: blur(18px);
      animation: logoGlow 4s ease-in-out infinite;
      pointer-events: none;
    }

    .logo-lg {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      position: relative;
      z-index: 1;
    }

    .wordmark-lg-wrap {
      margin-bottom: 8px;
      animation: fadeUp 0.8s ease 0.1s both;
      flex-shrink: 0;
    }

    .wordmark-lg {
      height: 42px;
      object-fit: contain;
      display: block;
    }

    .tagline {
      color: rgba(255,255,255,0.4);
      font-size: 1rem;
      margin-bottom: 40px;
      letter-spacing: 0.02em;
      line-height: 1.6;
      animation: fadeUp 0.8s ease 0.15s both;
      flex-shrink: 0;
    }

    .coming-soon {
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      color: #F5C518;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
      line-height: 1.6;
      animation: fadeUp 0.8s ease 0.25s both;
      flex-shrink: 0;
    }

    .coming-soon-dot {
      display: inline-block;
      width: 5px; height: 5px;
      background: #F5C518;
      border-radius: 50%;
      margin-left: 3px;
      vertical-align: middle;
      animation: pulse 1.5s ease-in-out infinite;
    }

    .desc {
      color: rgba(255,255,255,0.45);
      font-size: 0.9rem;
      line-height: 1.8;
      max-width: 440px;
      text-align: center;
      margin-bottom: 32px;
      animation: fadeUp 0.8s ease 0.3s both;
      flex-shrink: 0;
    }

    .email-form {
      display: flex;
      gap: 10px;
      width: 100%;
      max-width: 420px;
      margin-bottom: 40px;
      animation: fadeUp 0.8s ease 0.4s both;
      flex-shrink: 0;
    }

    .email-input {
      flex: 1;
      padding: 14px 18px;
      border-radius: 14px;
      border: 1.5px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: #fff;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      outline: none;
      transition: all 0.3s ease;
    }
    .email-input::placeholder { color: rgba(255,255,255,0.25); }
    .email-input:focus {
      border-color: rgba(245,197,24,0.5);
      background: rgba(255,255,255,0.08);
    }

    .submit-btn {
      padding: 14px 28px;
      border-radius: 14px;
      border: none;
      background: linear-gradient(135deg, #F5C518, #FFD54F);
      color: #071F18;
      font-weight: 600;
      font-size: 0.9rem;
      font-family: 'Inter', sans-serif;
      cursor: pointer;
      transition: all 0.3s ease;
      white-space: nowrap;
    }
    .submit-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 10px 30px -5px rgba(245,197,24,0.45);
    }
    .submit-btn:active { transform: translateY(0); }

    .social-links {
      display: flex;
      gap: 14px;
      animation: fadeUp 0.8s ease 0.5s both;
      flex-shrink: 0;
    }

    .social-link {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      text-decoration: none;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
    }

    .social-link-icon {
      width: 60px; height: 60px;
      border-radius: 18px;
      border: 1.5px solid rgba(255,255,255,0.07);
      background: rgba(255,255,255,0.03);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.35s cubic-bezier(0.16, 1, 0.3, 1);
      position: relative;
      overflow: hidden;
    }

    .social-link-icon::before {
      content: '';
      position: absolute;
      inset: 0;
      border-radius: 18px;
      background: linear-gradient(135deg, rgba(245,197,24,0.15), rgba(20,105,78,0.1));
      opacity: 0;
      transition: opacity 0.35s ease;
    }

    .social-link:hover { transform: translateY(-4px); }

    .social-link:hover .social-link-icon {
      border-color: rgba(245,197,24,0.4);
      box-shadow: 0 12px 32px -8px rgba(245,197,24,0.2);
    }

    .social-link:hover .social-link-icon::before { opacity: 1; }

    .social-link iconify-icon {
      font-size: 26px;
      color: rgba(255,255,255,0.4);
      transition: all 0.35s ease;
      position: relative;
      z-index: 1;
    }

    .social-link:hover iconify-icon { color: #F5C518; }

    .social-link-label {
      font-size: 0.7rem;
      font-weight: 500;
      color: rgba(255,255,255,0.25);
      letter-spacing: 0.02em;
      transition: color 0.35s ease;
    }

    .social-link:hover .social-link-label { color: rgba(255,255,255,0.7); }

    .social-link:nth-child(1) .social-link-icon { animation: socialFloat 5s ease-in-out infinite; }
    .social-link:nth-child(2) .social-link-icon { animation: socialFloat 5s ease-in-out 0.4s infinite; }
    .social-link:nth-child(3) .social-link-icon { animation: socialFloat 5s ease-in-out 0.8s infinite; }
    .social-link:nth-child(4) .social-link-icon { animation: socialFloat 5s ease-in-out 1.2s infinite; }
    .social-link:nth-child(5) .social-link-icon { animation: socialFloat 5s ease-in-out 1.6s infinite; }

    .bottombar {
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px 40px;
      flex-shrink: 0;
      animation: fadeUp 0.8s ease 0.6s both;
    }

    .bottombar-copy {
      color: rgba(255,255,255,0.15);
      font-size: 0.7rem;
    }

    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: #0F523E;
      color: #fff;
      padding: 12px 24px;
      border-radius: 12px;
      font-size: 0.82rem;
      font-weight: 500;
      z-index: 100;
      opacity: 0;
      transition: all 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      display: flex;
      align-items: center;
      gap: 8px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.5);
      white-space: nowrap;
    }
    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }
    .toast.error { background: #7F1D1D; }

    .side-line {
      position: fixed;
      width: 1px;
      height: 100px;
      background: linear-gradient(to bottom, transparent, rgba(245,197,24,0.12), transparent);
      pointer-events: none;
      z-index: 0;
    }
    .side-line.left { left: 36px; top: 50%; transform: translateY(-50%); }
    .side-line.right { right: 36px; top: 50%; transform: translateY(-50%); }

    .side-dot {
      position: fixed;
      width: 4px; height: 4px;
      background: rgba(245,197,24,0.2);
      border-radius: 50%;
      pointer-events: none;
      z-index: 0;
    }
    .side-dot.d1 { left: 34px; top: calc(50% - 58px); }
    .side-dot.d2 { left: 34px; top: calc(50% + 58px); }
    .side-dot.d3 { right: 34px; top: calc(50% - 58px); }
    .side-dot.d4 { right: 34px; top: calc(50% + 58px); }

    @media (max-width: 640px) {
      .topbar { padding: 16px 18px; }
      .bottombar { padding: 14px 18px; }
      .logo-wrap { width: 80px; height: 80px; margin-bottom: 18px; }
      .logo-glow { width: 130px; height: 130px; }
      .wordmark-lg { height: 30px; }
      .tagline { margin-bottom: 28px; }
      .desc { margin-bottom: 24px; font-size: 0.82rem; }
      .email-form { margin-bottom: 28px; flex-direction: column; max-width: 300px; }
      .submit-btn { width: 100%; }
      .side-line, .side-dot { display: none; }
      .social-links { gap: 10px; }
      .social-link-icon { width: 50px; height: 50px; border-radius: 15px; }
      .social-link iconify-icon { font-size: 22px; }
      .social-link-label { font-size: 0.62rem; }
      .wordmark-sm { height: 14px; }
    }

    @media (max-height: 640px) {
      .logo-wrap { width: 70px; height: 70px; margin-bottom: 14px; }
      .logo-glow { width: 110px; height: 110px; }
      .wordmark-lg { height: 28px; }
      .tagline { margin-bottom: 16px; font-size: 0.9rem; }
      .coming-soon { margin-bottom: 4px; }
      .desc { margin-bottom: 18px; line-height: 1.5; }
      .email-form { margin-bottom: 22px; }
      .social-links { gap: 8px; }
      .social-link-icon { width: 44px; height: 44px; border-radius: 13px; }
      .social-link iconify-icon { font-size: 20px; }
      .social-link-label { font-size: 0.6rem; }
      .topbar { padding: 10px 24px; }
      .bottombar { padding: 10px 24px; }
    }
  </style>
</head>
<body>

  <div class="glow-1"></div>
  <div class="glow-2"></div>

  <div class="side-line left"></div>
  <div class="side-line right"></div>
  <div class="side-dot d1"></div>
  <div class="side-dot d2"></div>
  <div class="side-dot d3"></div>
  <div class="side-dot d4"></div>

  <div class="page">

    <!-- Top bar: logo.svg icon + logo2.svg wordmark -->
    <header class="topbar">
      <a href="#" class="topbar-logo">
        <img class="logo-sm" src="logo.svg" alt="CrewKart">
        <img class="wordmark-sm" src="logo2.svg" alt="CrewKart">
      </a>
    </header>

    <main class="center">
      <!-- Center: logo.svg icon with glow -->
      <div class="logo-wrap">
        <div class="logo-glow"></div>
        <img class="logo-lg" src="logo.svg" alt="CrewKart">
      </div>

      <!-- logo2.svg wordmark (replaces "CrewKart" text) -->
      <div class="wordmark-lg-wrap">
        <img class="wordmark-lg" src="logo2.svg" alt="CrewKart">
      </div>

      <p class="tagline">Connect. Create. Collaborate.</p>

      <p class="coming-soon">We're Coming Soon<span class="coming-soon-dot"></span></p>
      <p class="desc">The marketplace where content creators meet creative professionals of every kind. Drop your email — we'll notify you at launch.</p>

      <form class="email-form" onsubmit="handleSubmit(event)">
        <input type="email" id="email" name="email" class="email-input" placeholder="Enter your email" required>
        <button type="submit" class="submit-btn">Notify Me</button>
      </form>

      <div class="social-links">
        <a href="https://instagram.com/crewkart" target="_blank" rel="noopener" class="social-link">
          <div class="social-link-icon">
            <iconify-icon icon="lucide:instagram"></iconify-icon>
          </div>
          <span class="social-link-label">Instagram</span>
        </a>
        <a href="https://facebook.com/crewkart" target="_blank" rel="noopener" class="social-link">
          <div class="social-link-icon">
            <iconify-icon icon="lucide:facebook"></iconify-icon>
          </div>
          <span class="social-link-label">Facebook</span>
        </a>
        <a href="https://x.com/crewkart" target="_blank" rel="noopener" class="social-link">
          <div class="social-link-icon">
            <iconify-icon icon="ri:twitter-x-fill"></iconify-icon>
          </div>
          <span class="social-link-label">X</span>
        </a>
        <a href="https://linkedin.com/company/crewkart" target="_blank" rel="noopener" class="social-link">
          <div class="social-link-icon">
            <iconify-icon icon="lucide:linkedin"></iconify-icon>
          </div>
          <span class="social-link-label">LinkedIn</span>
        </a>
        <a href="https://reddit.com/r/crewkart" target="_blank" rel="noopener" class="social-link">
          <div class="social-link-icon">
            <iconify-icon icon="lucide:message-circle"></iconify-icon>
          </div>
          <span class="social-link-label">Reddit</span>
        </a>
      </div>
    </main>

    <footer class="bottombar">
      <span class="bottombar-copy">© 2025 CrewKart. All rights reserved.</span>
    </footer>

  </div>

  <div id="toast" class="toast">
    <iconify-icon id="toast-icon" icon="lucide:check-circle" style="font-size: 15px; color: #F5C518;"></iconify-icon>
    <span id="toast-msg"></span>
  </div>

  <script>
    var toastTimer;
    function showToast(msg, isError) {
      var toast = document.getElementById('toast');
      var icon = document.getElementById('toast-icon');
      document.getElementById('toast-msg').textContent = msg;
      toast.classList.remove('error');
      if (isError) {
        toast.classList.add('error');
        icon.setAttribute('icon', 'lucide:alert-circle');
        icon.style.color = '#FCA5A5';
      } else {
        icon.setAttribute('icon', 'lucide:check-circle');
        icon.style.color = '#F5C518';
      }
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function() { toast.classList.remove('show'); }, 3000);
    }

    function handleSubmit(e) {
      e.preventDefault();
      var email = document.getElementById('email').value.trim();
      if (!email) return;
      showToast("You're on the list! We'll reach out soon.");
      document.getElementById('email').value = '';
    }
  </script>
</body>
</html>
